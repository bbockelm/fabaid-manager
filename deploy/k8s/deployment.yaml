apiVersion: apps/v1
kind: Deployment
metadata:
  name: fabaid-manager
  labels:
    app: fabaid-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fabaid-manager
  template:
    metadata:
      labels:
        app: fabaid-manager
    spec:
      containers:
        - name: fabaid-backend
          image: ghcr.io/bbockelm/fabaid-manager:latest
          ports:
            - containerPort: 8080
              name: api
            - containerPort: 3000
              name: frontend
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fabaid-secrets
                  key: database-url
            - name: S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: fabaid-config
                  key: s3-endpoint
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: fabaid-config
                  key: s3-bucket
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: fabaid-secrets
                  key: s3-access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fabaid-secrets
                  key: s3-secret-key
            - name: S3_USE_SSL
              value: "true"
            - name: S3_USE_PATH_STYLE
              value: "false"
            - name: APP_ENV
              value: "production"
            - name: APP_PORT
              value: "8080"
            - name: OIDC_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: fabaid-config
                  key: oidc-issuer
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: fabaid-secrets
                  key: oidc-client-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fabaid-secrets
                  key: oidc-client-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: fabaid-manager
spec:
  selector:
    app: fabaid-manager
  ports:
    - name: api
      port: 8080
      targetPort: 8080
    - name: frontend
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fabaid-config
data:
  s3-endpoint: "https://s3.amazonaws.com"
  s3-bucket: "fabaid-documents"
  oidc-issuer: "https://sso.example.com/realms/fabaid"
---
apiVersion: v1
kind: Secret
metadata:
  name: fabaid-secrets
type: Opaque
stringData:
  database-url: "postgres://fabaid:CHANGEME@postgres:5432/fabaid?sslmode=require"
  s3-access-key: "CHANGEME"
  s3-secret-key: "CHANGEME"
  oidc-client-id: "fabaid-manager"
  oidc-client-secret: "CHANGEME"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fabaid-manager
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: fabaid.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fabaid-manager
                port:
                  number: 8080
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: fabaid-manager
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fabaid-manager
                port:
                  number: 3000
