      - $ref: "#/components/parameters/entityType"
      - $ref: "#/components/parameters/entityID"
      - $ref: "#/components/parameters/budgetID"
      - name: docID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [institution-rates]
      summary: Download a budget document file
      operationId: downloadBudgetDocument
      responses:
        "200":
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # ── Authentication ──────────────────────────────────────
  /auth/mode:
    get:
      tags: [auth]
      summary: Get current authentication mode
      operationId: getAuthMode
      security: []
      responses:
        "200":
          description: Authentication mode info
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode:
                    type: string
                    enum: [dev, oidc]
                  oidc_configured:
                    type: boolean
                  allow_dev_login:
                    type: boolean

  /auth/me:
    get:
      tags: [auth]
      summary: Get current session info
      operationId: getCurrentSession
      security: []
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"
        "401":
          description: Not authenticated

  /auth/logout:
    post:
      tags: [auth]
      summary: Destroy the current session
      operationId: logout
      security: []
      responses:
        "200":
          description: Logged out

  /auth/dev-login:
    post:
      tags: [auth]
      summary: Log in as a dev user (dev mode only)
      operationId: devLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                email:
                  type: string
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"

  /auth/oidc/login:
    get:
      tags: [auth]
      summary: Start OIDC login flow (redirects to IdP)
      operationId: oidcLogin
      security: []
      responses:
        "302":
          description: Redirect to OIDC provider

  /auth/oidc/callback:
    get:
      tags: [auth]
      summary: OIDC callback (handles code exchange)
      operationId: oidcCallback
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to app after successful login

  /auth/profile:
    put:
      tags: [auth]
      summary: Update own display name
      operationId: updateMyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Admin — User Management ────────────────────────────
  /admin/users:
    get:
      tags: [admin]
      summary: List all users
      operationId: listUsers
      responses:
        "200":
          description: Array of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags: [admin]
      summary: Create a user account
      operationId: createUserAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                email:
                  type: string
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{userID}:
    parameters:
      - name: userID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      tags: [admin]
      summary: Update a user account
      operationId: updateUserAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                email:
                  type: string
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      tags: [admin]
      summary: Delete a user account
      operationId: deleteUserAccount
      responses:
        "204":
          description: Deleted

  /admin/users/{userID}/roles:
    parameters:
      - name: userID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [admin]
      summary: Add a role to a user
      operationId: addUserRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, grant_admin, read_only]
      responses:
        "200":
          description: Role added

  /admin/users/{userID}/roles/{role}:
    parameters:
      - name: userID
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: role
        in: path
        required: true
        schema:
          type: string
    delete:
      tags: [admin]
      summary: Remove a role from a user
      operationId: removeUserRole
      responses:
        "200":
          description: Role removed

  /admin/users/{userID}/identities/{identityID}:
    parameters:
      - name: userID
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: identityID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [admin]
      summary: Remove an identity from a user
      operationId: removeUserIdentity
      responses:
        "200":
          description: Identity removed

  /admin/users/{userID}/invites:
    parameters:
      - name: userID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [admin]
      summary: Create an invite for a user
      operationId: createInvite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        "201":
          description: Created invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"
    get:
      tags: [admin]
      summary: List invites for a user
      operationId: listInvites
      responses:
        "200":
          description: Array of invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invite"

  /admin/users/{userID}/invites/{inviteID}:
    parameters:
      - name: userID
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: inviteID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [admin]
      summary: Delete an invite
      operationId: deleteInvite
      responses:
        "204":
          description: Deleted

  # ── Admin — OIDC Config ────────────────────────────────
  /admin/oidc-config:
    get:
      tags: [admin]
      summary: Get OIDC configuration
      operationId: getOIDCConfig
      responses:
        "200":
          description: OIDC configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  issuer:
                    type: string
                  client_id:
                    type: string
                  client_secret:
                    type: string
                  redirect_url:
                    type: string
    put:
      tags: [admin]
      summary: Update OIDC configuration
      operationId: updateOIDCConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issuer:
                  type: string
                client_id:
                  type: string
                client_secret:
                  type: string
                redirect_url:
                  type: string
      responses:
        "200":
          description: Updated OIDC configuration

  # ── Admin — API Keys ───────────────────────────────────
  /admin/api-keys:
    get:
      tags: [admin]
      summary: List API keys
      operationId: listAPIKeys
      responses:
        "200":
          description: Array of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIKey"
    post:
      tags: [admin]
      summary: Create an API key
      operationId: createAPIKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Created API key (includes plain-text key — shown only once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreateResponse"

  /admin/api-keys/{keyID}/revoke:
    parameters:
      - name: keyID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [admin]
      summary: Revoke an API key
      operationId: revokeAPIKey
      responses:
        "200":
          description: API key revoked

  /admin/api-keys/{keyID}:
    parameters:
      - name: keyID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [admin]
      summary: Delete an API key
      operationId: deleteAPIKey
      responses:
        "204":
          description: Deleted

  # ── Backups ────────────────────────────────────────────
  /backup:
    get:
      tags: [backups]
      summary: Legacy backup download (creates + streams tar.gz)
      operationId: createBackupLegacy
      responses:
        "200":
          description: tar.gz archive
          content:
            application/gzip:
              schema:
                type: string
                format: binary

  /backups:
    get:
      tags: [backups]
      summary: List backups
      operationId: listBackups
      responses:
        "200":
          description: Array of backup records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Backup"

  /backups/trigger:
    post:
      tags: [backups]
      summary: Trigger a new backup (admin)
      operationId: triggerBackup
      responses:
        "201":
          description: Backup record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backup"

  /backups/upload-restore:
    post:
      tags: [backups]
      summary: Upload and restore from a backup file (admin)
      operationId: uploadRestore
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                encryption_key:
                  type: string
      responses:
        "200":
          description: Restore triggered

  /backups/settings:
    get:
      tags: [backups]
      summary: Get backup settings (admin)
      operationId: getBackupSettings
      responses:
        "200":
          description: Backup settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSettings"
    put:
      tags: [backups]
      summary: Update backup settings (admin)
      operationId: updateBackupSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSettings"

  /backups/general-key:
    get:
      tags: [backups]
      summary: Get the general backup encryption key (admin)
      operationId: getGeneralBackupKey
      responses:
        "200":
          description: Encryption key info
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string

  /backups/derive-key:
    post:
      tags: [backups]
      summary: Derive an encryption key from a passphrase (admin)
      operationId: deriveKeyFromInput
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [passphrase]
              properties:
                passphrase:
                  type: string
      responses:
        "200":
          description: Derived key
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string

  /backups/{backupID}/download:
    parameters:
      - name: backupID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [backups]
      summary: Download a backup archive (admin)
      operationId: downloadBackup
      responses:
        "200":
          description: Backup archive
          content:
            application/gzip:
              schema:
                type: string
                format: binary

  /backups/{backupID}/key:
    parameters:
      - name: backupID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [backups]
      summary: Get per-backup encryption key (admin)
      operationId: getPerBackupKey
      responses:
        "200":
          description: Per-backup key
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string

  /backups/{backupID}/restore:
    parameters:
      - name: backupID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [backups]
      summary: Restore from an existing backup (admin)
      operationId: restoreBackup
      responses:
        "200":
          description: Restore triggered

  /backups/{backupID}:
    parameters:
      - name: backupID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [backups]
      summary: Delete a backup (admin)
      operationId: deleteBackup
      responses:
        "204":
          description: Deleted

  # ── Health Check ────────────────────────────────────────
  # NOTE: /healthz is served at the root, not under /api/v1.
  /healthz:
    get:
      tags: [health]
      summary: Health check
      operationId: healthCheck
      security: []
      servers:
        - url: /
          description: Root (not under /api/v1)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
