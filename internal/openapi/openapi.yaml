openapi: "3.0.3"
info:
  title: FabAID Manager API
  description: NSF grant/project tracking — effort, budgets, subawards, invoices, and statements of work.
  version: "1.0.0"
  license:
    name: Apache-2.0
servers:
  - url: /api/v1
    description: API v1

tags:
  - name: auth
    description: Authentication & session management
  - name: grants
    description: Grant CRUD
  - name: wbs
    description: Work Breakdown Structure areas
  - name: personnel
    description: Personnel on a grant
  - name: subawards
    description: Subawards under a grant
  - name: invoices
    description: Invoices for a subaward
  - name: sow
    description: Statements of Work
  - name: documents
    description: Uploaded documents / files
  - name: institution-rates
    description: Overhead rates, fringe rates, and budgets scoped to grant or subaward
  - name: budget-line-items
    description: Line items within an institution budget
  - name: budget-documents
    description: Encrypted budget document uploads
  - name: backups
    description: Backup & restore
  - name: admin
    description: User & API-key management (admin only)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Session cookie or API key (Bearer fabaid_…)
    cookieAuth:
      type: apiKey
      in: cookie
      name: session

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Grant:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        award_number:
          type: string
        title:
          type: string
        pi_name:
          type: string
        institution:
          type: string
        agency:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        total_budget:
          type: number
          format: double
        salary_escalation_rate:
          type: number
          format: double
        status:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    WBSArea:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        grant_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
        code:
          type: string
        name:
          type: string
        description:
          type: string
        budget:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    WBSEffortSummary:
      type: object
      properties:
        wbs_area_id:
          type: string
          format: uuid
        wbs_code:
          type: string
        wbs_name:
          type: string
        fiscal_year:
          type: integer
        effort_months:
          type: number
          format: double
        amount:
          type: number
          format: double

    Personnel:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        grant_id:
          type: string
          format: uuid
        wbs_area_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        role:
          type: string
          enum:
            - pi
            - co_pi
            - subaward_pi
            - senior_personnel
            - postdoc
            - other_professional
            - graduate_student
            - undergraduate_student
            - clerical
            - other
        title:
          type: string
          description: Descriptive job title
        institution:
          type: string
        annual_salary:
          type: number
          format: double
        funded_months:
          type: number
          format: double
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    PersonnelBudgetEntry:
      type: object
      properties:
        institution:
          type: string
        fiscal_year:
          type: integer
        effort_months:
          type: number
          format: double
        amount:
          type: number
          format: double

    PersonnelDefaultWBS:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        personnel_id:
          type: string
          format: uuid
        wbs_area_id:
          type: string
          format: uuid
        percent:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    Subaward:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        grant_id:
          type: string
          format: uuid
        institution:
          type: string
        pi_name:
          type: string
        total_amount:
          type: number
          format: double
        salary_escalation_rate:
          type: number
          format: double
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    Invoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        subaward_id:
          type: string
          format: uuid
        invoice_number:
          type: string
        invoice_date:
          type: string
          format: date
        amount:
          type: number
          format: double
        period_start:
          type: string
          format: date
          nullable: true
        period_end:
          type: string
          format: date
          nullable: true
        status:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    StatementOfWork:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        subaward_id:
          type: string
          format: uuid
        fiscal_year:
          type: integer
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        budget_amount:
          type: number
          format: double
        scope_text:
          type: string
        status:
          type: string
        signed_doc_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    Document:
      type: object
      properties:

    SOWConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        grant_id:
          type: string
          format: uuid
        header_title:
          type: string
        header_subtitle:
          type: string
        project_name:
          type: string
        intro_template:
          type: string
        costs_template:
          type: string
        concurrence_signers:
          type: string
          description: JSON array of signer objects with name, title, affiliation
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    SOWPersonnelDescription:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        sow_id:
          type: string
          format: uuid
        personnel_id:
          type: string
          format: uuid
        description_md:
          type: string
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    SOWLineItemDescription:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        sow_id:
          type: string
          format: uuid
        line_item_id:
          type: string
          format: uuid
        description_md:
          type: string
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        id:
          type: string
          format: uuid
          readOnly: true
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        filename:
          type: string
        content_type:
          type: string
        s3_key:
          type: string
        file_size:
          type: integer
          format: int64
        uploaded_by:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true

    OverheadRate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        rate_name:
          type: string
        rate:
          type: number
          format: double
        description:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    InstitutionFringeRate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        fiscal_year:
          type: integer
        rate_name:
          type: string
        rate:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    InstitutionBudget:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        fiscal_year:
          type: integer
        version:
          type: integer
          readOnly: true
        is_latest:
          type: boolean
          readOnly: true
        status:
          type: string
          enum: [draft, final]
        budget:
          type: number
          format: double
        notes:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true

    BudgetLineItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        institution_budget_id:
          type: string
          format: uuid
        line_type:
          type: string
          enum:
            - personnel
            - fringe
            - travel
            - equipment
            - supplies
            - contractual
            - participant_support
            - tuition
            - other
        description:
          type: string
        personnel_id:
          type: string
          format: uuid
          nullable: true
        effort_months:
          type: number
          format: double
        amount:
          type: number
          format: double
        overhead_rate_id:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    BudgetLineItemWBS:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        line_item_id:
          type: string
          format: uuid
        wbs_area_id:
          type: string
          format: uuid
        allocation_percent:
          type: number
          format: double

    BudgetDocument:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        budget_id:
          type: string
          format: uuid
          nullable: true
        doc_type:
          type: string
        filename:
          type: string
        content_type:
          type: string
        s3_key:
          type: string
        file_size:
          type: integer
          format: int64
        uploaded_by:
          type: string
          nullable: true
        uploaded_by_name:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
        deleted_by:
          type: string
          nullable: true

    SessionInfo:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        role:
          type: string
        roles:
          type: array
          items:
            type: string
        is_dev_login:
          type: boolean

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        display_name:
          type: string
        status:
          type: string
        last_login:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    APIKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        key_prefix:
          type: string
          readOnly: true
        roles:
          type: array
          items:
            type: string
        created_by:
          type: string
        created_by_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        idle_timeout_s:
          type: integer
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true

    APIKeyCreateResponse:
      allOf:
        - $ref: "#/components/schemas/APIKey"
        - type: object
          properties:
            raw_key:
              type: string
              description: Shown exactly once at creation time.

    Backup:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        filename:
          type: string
        s3_key:
          type: string
        s3_bucket:
          type: string
        size_bytes:
          type: integer
          format: int64
        status:
          type: string
          enum: [running, completed, failed]
        status_detail:
          type: string
        error_msg:
          type: string
        initiated_by:
          type: string
          enum: [scheduler, manual]
        encrypted:
          type: boolean
        checksum:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true

    BackupSettings:
      type: object
      properties:
        backup_frequency_hours:
          type: integer
        backup_bucket:
          type: string
        backup_endpoint:
          type: string
        backup_access_key:
          type: string
        backup_secret_key:
          type: string
        backup_use_ssl:
          type: boolean

    Invite:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        token:
          type: string
        user_id:
          type: string
          format: uuid
        role:
          type: string
        used:
          type: boolean
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
          readOnly: true

  parameters:
    grantID:
      name: grantID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    subawardID:
      name: subawardID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    personnelID:
      name: personnelID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    entityType:
      name: entityType
      in: path
      required: true
      schema:
        type: string
        enum: [grant, subaward]
    entityID:
      name: entityID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    budgetID:
      name: budgetID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    lineItemID:
      name: lineItemID
      in: path
      required: true
      schema:
        type: string
        format: uuid

security:
  - bearerAuth: []
  - cookieAuth: []

paths:
  # ── Grants ──────────────────────────────────────────────
  /grants:
    get:
      tags: [grants]
      summary: List all grants
      operationId: listGrants
      responses:
        "200":
          description: Array of grants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grant"
    post:
      tags: [grants]
      summary: Create a grant
      operationId: createGrant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Grant"
      responses:
        "201":
          description: Created grant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grant"

  /grants/{grantID}:
    parameters:
      - $ref: "#/components/parameters/grantID"
    get:
      tags: [grants]
      summary: Get a grant by ID
      operationId: getGrant
      responses:
        "200":
          description: Grant object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grant"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [grants]
      summary: Update a grant
      operationId: updateGrant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Grant"
      responses:
        "200":
          description: Updated grant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grant"
    delete:
      tags: [grants]
      summary: Delete a grant
      operationId: deleteGrant
      responses:
        "204":
          description: Deleted

  # ── WBS Areas ───────────────────────────────────────────
  /grants/{grantID}/wbs:
    parameters:
      - $ref: "#/components/parameters/grantID"
    get:
      tags: [wbs]
      summary: List WBS areas for a grant
      operationId: listWBSAreas
      responses:
        "200":
          description: Array of WBS areas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WBSArea"
    post:
      tags: [wbs]
      summary: Create a WBS area
      operationId: createWBSArea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WBSArea"
      responses:
        "201":
          description: Created WBS area
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WBSArea"

  /grants/{grantID}/wbs/effort-summary:
    parameters:
      - $ref: "#/components/parameters/grantID"
    get:
      tags: [wbs]
      summary: Get WBS effort summary across fiscal years
      operationId: wbsEffortSummary
      responses:
        "200":
          description: Array of effort summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WBSEffortSummary"

  /grants/{grantID}/wbs/{wbsID}:
    parameters:
      - $ref: "#/components/parameters/grantID"
      - name: wbsID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [wbs]
      summary: Get a WBS area
      operationId: getWBSArea
      responses:
        "200":
          description: WBS area
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WBSArea"
    put:
      tags: [wbs]
      summary: Update a WBS area
      operationId: updateWBSArea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WBSArea"
      responses:
        "200":
          description: Updated WBS area
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WBSArea"
    delete:
      tags: [wbs]
      summary: Delete a WBS area
      operationId: deleteWBSArea
      responses:
        "204":
          description: Deleted

  # ── Personnel ───────────────────────────────────────────
  /grants/{grantID}/personnel:
    parameters:
      - $ref: "#/components/parameters/grantID"
    get:
      tags: [personnel]
      summary: List personnel for a grant
      operationId: listPersonnel
      responses:
        "200":
          description: Array of personnel
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Personnel"
    post:
      tags: [personnel]
      summary: Create a personnel record
      operationId: createPersonnel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Personnel"
      responses:
        "201":
          description: Created personnel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Personnel"

  /grants/{grantID}/personnel/titles:
    parameters:
      - $ref: "#/components/parameters/grantID"
    get:
      tags: [personnel]
      summary: List distinct personnel titles
      operationId: listPersonnelTitles
      responses:
        "200":
          description: Array of title strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /grants/{grantID}/personnel/{personnelID}:
    parameters:
      - $ref: "#/components/parameters/grantID"
      - $ref: "#/components/parameters/personnelID"
    put:
      tags: [personnel]
      summary: Update a personnel record
      operationId: updatePersonnel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Personnel"
      responses:
        "200":
          description: Updated personnel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Personnel"
    delete:
      tags: [personnel]
      summary: Delete a personnel record
      operationId: deletePersonnel
      responses:
        "204":
          description: Deleted

  /grants/{grantID}/personnel/{personnelID}/budget-summary:
    parameters:
      - $ref: "#/components/parameters/grantID"
      - $ref: "#/components/parameters/personnelID"
    get:
      tags: [personnel]
      summary: Budget summary for a person across years
      operationId: personnelBudgetSummary
      responses:
        "200":
          description: Array of budget entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonnelBudgetEntry"

  /grants/{grantID}/personnel/{personnelID}/default-wbs:
    parameters:
      - $ref: "#/components/parameters/grantID"
      - $ref: "#/components/parameters/personnelID"
    get:
      tags: [personnel]
      summary: List default WBS allocations for a person
      operationId: listPersonnelDefaultWBS
      responses:
        "200":
          description: Array of WBS allocations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonnelDefaultWBS"
    put:
